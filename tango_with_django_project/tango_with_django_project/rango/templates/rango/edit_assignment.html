{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'rango:view_courses' %}">
                Student Task Manager
            </a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <div class="collapse navbar-collapse" id="navbarNav">
    

                <ul class="navbar-nav me-auto">
    
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:view_courses' %}">
                            Dashboard
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:view_courses_page' %}">
                            Courses
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:filter_assignment' %}">
                            Assignments
                        </a>
                    </li>
    
                </ul>
    

                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:logout' %}">
                            Logout
                        </a>
                    </li>
                </ul>
    
            </div>
        </div>
    </nav>

<main class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h1 class="mb-4">Edit Assignment</h1>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Assignment Name</label>
                    <input type="text" name="title" class="form-control"
                           value="{{ assignment.name }}">
                </div>

                <div class="mb-3">
                    <label>Course</label>
                    <select name="course_id" class="form-select">
                        {% for course in courses %}
                            <option value="{{ course.id }}"
                                {% if course.id == assignment.course.id %}selected{% endif %}>
                                {{ course.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea class="form-control" id="description" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label>Deadline</label>
                    <input type="date" name="deadline" class="form-control"
                           value="{{ assignment.deadline }}">
                </div>

                <button type="submit" class="btn btn-primary">Save Changes</button>

                <a href="{% url 'rango:view_courses' %}" 
                   class="btn btn-outline-secondary">
                    Cancel
                </a>

            </form>

        </div>
    </div>
</main>

</body>
</html>
