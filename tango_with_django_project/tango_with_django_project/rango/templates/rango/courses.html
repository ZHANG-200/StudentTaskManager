{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Student Task Manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'rango:view_courses' %}">
                Student Task Manager
            </a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <div class="collapse navbar-collapse" id="navbarNav">
    

                <ul class="navbar-nav me-auto">
    
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:view_courses' %}">
                            Dashboard
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:view_courses_page' %}">
                            Courses
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:filter_assignment' %}">
                            Assignments
                        </a>
                    </li>
    
                </ul>
    

                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rango:logout' %}">
                            Logout
                        </a>
                    </li>
                </ul>
    
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Courses</h1>
            <a href="#" class="btn btn-success">Add Course</a>
        </div>

        <div class="list-group">
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1">English Literature</h5>
                    <small class="text-muted">3 assignments</small>
                </div>
                <div>
                    <a href="#" class="btn btn-sm btn-outline-primary">View</a>
                    <a href="#" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="#" class="btn btn-sm btn-outline-danger">Delete</a>
                </div>
            </div>
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1">Physics 101</h5>
                    <small class="text-muted">2 assignments</small>
                </div>
                <div>
                    <a href="#" class="btn btn-sm btn-outline-primary">View</a>
                    <a href="#" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="#" class="btn btn-sm btn-outline-danger">Delete</a>
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/interactive.js' %}"></script>
</body>
</html>
